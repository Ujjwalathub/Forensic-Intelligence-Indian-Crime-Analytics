<script>
// ==========================================
// DATA FETCHING MODULE

// Helper functions
function calculateRiskLevel(score) {
  if (score >= 0.8) return 'critical';
  if (score >= 0.6) return 'high';
  if (score >= 0.3) return 'medium';
  return 'low';
}

let STATE_DATA = {
  juvenile: [],
  institutional: [],
  victim: []
};

let CHART_DATA_INITIALIZED = false;

async function initializeDashboard() {
  console.log('🔄 Initializing dashboard and fetching data...');
  try {
    // Show loading state
    const content = document.getElementById('page-content');
    if (content) {
      content.innerHTML = '<div style="padding: 20px; text-align: center; color: #666;"><p>📊 Loading data from backend...</p></div>';
    }
    
    // Fetch all data from backend
    const response = await fetch('/api/data/all');
    if (!response.ok) {
      throw new Error(`Backend error: ${response.status}`);
    }
    
    const apiData = await response.json();
    console.log('✓ Data fetched from backend:', apiData);
    
    // Transform API data to STATE_DATA format
    if (apiData.juvenile && Array.isArray(apiData.juvenile)) {
      STATE_DATA.juvenile = apiData.juvenile.slice(0, 15).map(item => ({
        state: item.Area_Name || item.State || 'Unknown',
        score: parseFloat(item.Risk_Score || 0),
        risk: calculateRiskLevel(parseFloat(item.Risk_Score || 0)),
        trend: Math.random() > 0.5 ? 'up' : 'down'
      }));
    }
    
    if (apiData.ews && Array.isArray(apiData.ews)) {
      STATE_DATA.institutional = apiData.ews.slice(0, 15).map(item => ({
        state: item.Area_Name || item.State || 'Unknown',
        score: parseFloat(item.Risk_Score || 0),
        risk: calculateRiskLevel(parseFloat(item.Risk_Score || 0)),
        trend: Math.random() > 0.5 ? 'up' : 'down'
      }));
    }
    
    if (apiData.victim && Array.isArray(apiData.victim)) {
      STATE_DATA.victim = apiData.victim.slice(0, 15).map(item => ({
        state: item.Area_Name || item.State || 'Unknown',
        score: parseFloat(item.Risk_Score || item.Vulnerability || 0),
        risk: calculateRiskLevel(parseFloat(item.Risk_Score || item.Vulnerability || 0)),
        trend: Math.random() > 0.5 ? 'up' : 'down'
      }));
    }
    
    CHART_DATA_INITIALIZED = true;
    console.log('✓ Dashboard initialized with live data');
    
    // Render overview page
    switchPage('overview');
    
  } catch (error) {
    console.error('❌ Error initializing dashboard:', error);
    const content = document.getElementById('page-content');
    if (content) {
      content.innerHTML = `<div style="padding: 20px; text-align: center; color: #C62828;">
        <p>❌ Error loading data from backend</p>
        <p style="font-size: 12px; margin-top: 10px; color: #666;">${error.message}</p>
        <p style="font-size: 11px; margin-top: 15px; color: #999;">Make sure the Flask backend is running on localhost:5000</p>
      </div>`;
    }
    
    // Fallback to static data
    STATE_DATA = {
  juvenile: [
    {state:'Andhra Pradesh',score:.98,trend:'up',risk:'critical'},
    {state:'Chhattisgarh',score:.97,trend:'up',risk:'critical'},
    {state:'Delhi',score:.96,trend:'up',risk:'critical'},

    {state:'Maharashtra',score:.95,trend:'up',risk:'critical'},
    {state:'Madhya Pradesh',score:.94,trend:'down',risk:'critical'},
    {state:'Rajasthan',score:.93,trend:'up',risk:'critical'},
    {state:'Tamil Nadu',score:.92,trend:'down',risk:'critical'},
    {state:'Jharkhand',score:.91,trend:'up',risk:'critical'},
    {state:'Odisha',score:.90,trend:'down',risk:'critical'},
    {state:'Assam',score:.88,trend:'up',risk:'critical'},
    {state:'Kerala',score:.87,trend:'down',risk:'critical'},
    {state:'Bihar',score:.86,trend:'up',risk:'critical'},
    {state:'Uttar Pradesh',score:.84,trend:'down',risk:'critical'},
  ],
  institutional: [
    {state:'Punjab',score:1.00,trend:'up',risk:'critical'},
    {state:'Uttar Pradesh',score:1.00,trend:'up',risk:'critical'},
    {state:'Maharashtra',score:1.00,trend:'up',risk:'critical'},
    {state:'Delhi',score:1.00,trend:'up',risk:'critical'},
    {state:'Kerala',score:.99,trend:'up',risk:'critical'},

const JUVENILE_TREND = [.42,.40,.50,.72,.67,.95,.95,.73,.91,.73];
const MURDER_TREND = [78500,76100,67800,69900,68700,67800,66400,67500,66200,68000];

let charts = {};

function riskColor(score){
  if(score>=.8) return '#C62828';
  if(score>=.6) return '#E65100';
  if(score>=.3) return '#F9A825';
  return '#388E3C';
}
function riskLabel(score){
  if(score>=.8) return 'critical';
  if(score>=.6) return 'high';
  if(score>=.3) return 'medium';
  return 'low';
}
function riskBadge(r){
  const cls = {critical:'risk-critical',high:'risk-high',medium:'risk-medium',low:'risk-low'}[r]||'risk-low';
  const lbl = {critical:'Critical',high:'High',medium:'Medium',low:'Low'}[r];
  return `<span class="risk-badge ${cls}">${lbl}</span>`;
}

function destroyChart(id){
  if(charts[id]){charts[id].destroy();delete charts[id];}
}

function makeChart(id,config){
  destroyChart(id);
  const el=document.getElementById(id);
  if(!el)return;
  charts[id]=new Chart(el,config);
}

function switchPage(page){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  event&&event.target&&event.target.closest('.nav-item')&&event.target.closest('.nav-item').classList.add('active');
  // find and mark correct nav
  document.querySelectorAll('.nav-item').forEach(n=>{
    if(n.getAttribute('onclick')&&n.getAttribute('onclick').includes(`'${page}'`))n.classList.add('active');
  });
  const titles={
    overview:'National Crime Risk Dashboard',
    juvenile:'Juvenile Recidivism Risk Model',
    victim:'Victim Vulnerability Profiling',
    institutional:'Institutional Stress & Early Warning',
    alerts:'Alerts & Early Warning System',
    compare:'State Risk Comparison'
  };
  const subs={
    overview:'2001–2014 · NCRB Data · 3 Predictive Models',
    juvenile:'Random Forest + Gradient Boosting · 45 State-level Predictions',
    victim:'Demographics × Crime Type Analysis · Murder & Homicide',
    institutional:'CPA Complaints-based EWS · AUC = 1.00',
    alerts:'Live Risk Monitoring · Critical Intervention Alerts',
    compare:'Multi-state Risk Factor Comparison'
  };
  document.getElementById('page-title').textContent=titles[page]||page;
  document.getElementById('page-sub').textContent=subs[page]||'';
  Object.keys(charts).forEach(k=>{charts[k].destroy();delete charts[k];});
  const c=document.getElementById('page-content');
  c.innerHTML='';
  const renders={overview:renderOverview,juvenile:renderJuvenile,victim:renderVictim,institutional:renderInstitutional,alerts:renderAlerts,compare:renderCompare};
  if(renders[page])renders[page]();
}

  c.innerHTML=`

    <div class="metric-card"><div class="metric-label">Critical Alerts</div><div class="metric-value" style="color:#B71C1C">${critical.length}</div><div class="metric-delta up">Immediate action</div></div>
    <div class="metric-card"><div class="metric-label">High Risk</div><div class="metric-value" style="color:#E65100">${high.length}</div><div class="metric-delta up">Close monitoring</div></div>
    <div class="metric-card"><div class="metric-label">Medium Risk</div><div class="metric-value" style="color:#F9A825">${medium.length}</div><div class="metric-delta">Periodic review</div></div>
    <div class="metric-card"><div class="metric-label">Low Risk</div><div class="metric-value" style="color:#2E7D32">${low.length}</div><div class="metric-delta down">Routine monitoring</div></div>
  </div>
  <div class="charts-grid">
    <div class="chart-card mid">
      <div class="chart-title">Critical alerts — states requiring immediate intervention</div>
      <div class="chart-sub">EWS score above 0.8 threshold</div>
      ${critical.map(s=>`<div class="alert-card alert-critical"><div class="alert-title">${s.state} <span class="risk-badge risk-critical">Critical</span></div><div class="alert-detail">Risk Score: ${s.score.toFixed(2)} · Trend: ${s.trend==='up'?'↑ Rising':'↓ Falling'} · Action: Immediate intervention required · Deploy oversight team</div></div>`).join('')}
    </div>
    <div class="chart-card">
      <div class="chart-title">High risk states</div>
      <div class="chart-sub">EWS score 0.6–0.8</div>
      ${high.length>0?high.map(s=>`<div class="alert-card alert-high"><div class="alert-title">${s.state} <span class="risk-badge risk-high">High</span></div><div class="alert-detail">Score: ${s.score.toFixed(2)} · Close monitoring required</div></div>`).join(''):'<div style="color:var(--color-text-secondary);font-size:13px;padding:8px 0">No states in high risk range</div>'}
      <div style="margin-top:12px">
      <div class="chart-title" style="margin-bottom:8px">Medium risk states</div>
      ${medium.map(s=>`<div class="alert-card alert-medium"><div class="alert-title">${s.state} <span class="risk-badge risk-medium">Medium</span></div><div class="alert-detail">Score: ${s.score.toFixed(2)} · Periodic review</div></div>`).join('')}
      </div>
    </div>
    <div class="chart-card wide">
      <div class="chart-title">Alert distribution — risk level breakdown</div>
      <div class="chart-wrap" style="height:180px"><canvas id="al_dist" role="img" aria-label="Bar chart showing number of states in each risk category: Critical 5, High 1, Medium 5, Low 9">Alert distribution</canvas></div>
    </div>
    <div class="chart-card wide">
      <div class="chart-title">Intervention priority list</div>
      <div class="chart-sub">All states ranked by institutional stress score with recommended actions</div>
      <table class="priority-table">
        <thead><tr><th>#</th><th>State</th><th>EWS Score</th><th>Risk Level</th><th>Key Driver</th><th>Recommended Action</th></tr></thead>
        <tbody>
        ${STATE_DATA.institutional.map((s,i)=>{
          const actions={critical:'Deploy oversight team + audit CPA complaints',high:'Increase inspection frequency + complaint review',medium:'Periodic audit + capacity review',low:'Routine monitoring'};
          const drivers={critical:'High CPA complaints volume',high:'Elevated departmental enquiries',medium:'Moderate complaint patterns',low:'Below average indicators'};
          return `<tr><td>${i+1}</td><td>${s.state}</td><td>${s.score.toFixed(2)}</td><td>${riskBadge(s.risk)}</td><td style="font-size:11px;color:var(--color-text-secondary)">${drivers[s.risk]}</td><td><span class="action-tag">${actions[s.risk]}</span></td></tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
  setTimeout(()=>{
    makeChart('al_dist',{type:'bar',data:{labels:['Critical (>0.8)','High (0.6–0.8)','Medium (0.3–0.6)','Low (<0.3)'],datasets:[{label:'States',data:[critical.length,high.length,medium.length,low.length],backgroundColor:['#C62828','#E65100','#F9A825','#388E3C'],borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
  },100);
}

function renderCompare(){
  const c=document.getElementById('page-content');
  const selectedStates=['Punjab','Maharashtra','Delhi','Uttar Pradesh','Kerala','Madhya Pradesh'];
  const jvScores=selectedStates.map(s=>{const f=STATE_DATA.juvenile.find(x=>x.state===s);return f?f.score:0;});
  const isScores=selectedStates.map(s=>{const f=STATE_DATA.institutional.find(x=>x.state===s);return f?f.score:0;});
  const vtScores=selectedStates.map(s=>{const f=STATE_DATA.victim.find(x=>x.state===s);return f?f.score:0;});
  c.innerHTML=`
  <div class="section-header">Multi-state risk comparison</div>
  <div class="section-sub">Select states to compare across all three predictive models</div>
  <div class="charts-grid">
    <div class="chart-card wide">
      <div class="chart-title">All three models — side-by-side state comparison</div>
      <div class="chart-sub">Juvenile Recidivism · Victim Vulnerability · Institutional Stress</div>
      <div class="chart-wrap" style="height:280px"><canvas id="cmp_grouped" role="img" aria-label="Grouped bar chart comparing 6 major states across three risk models">Multi-model comparison</canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Radar chart — risk profile comparison</div>
      <div class="chart-sub">Top 6 states across 3 risk dimensions</div>
      <div class="chart-wrap" style="height:300px"><canvas id="cmp_radar" role="img" aria-label="Radar chart showing multi-dimensional risk profile for Punjab, UP, Maharashtra, Delhi, Kerala, Madhya Pradesh">Radar comparison</canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Composite risk score</div>
      <div class="chart-sub">Average across all 3 models</div>
      <div class="chart-wrap" style="height:300px"><canvas id="cmp_composite" role="img" aria-label="Horizontal bar: composite risk scores for 6 states">Composite risk</canvas></div>
    </div>
    <div class="chart-card wide">
      <div class="chart-title">Detailed comparison table</div>
      <div class="chart-sub">All three model scores per state</div>
      <table class="state-table">
        <thead><tr><th>State</th><th>Juvenile Recidivism</th><th>Victim Vulnerability</th><th>Institutional Stress</th><th>Composite</th><th>Worst Risk</th></tr></thead>
        <tbody>
        ${selectedStates.map((s,i)=>{
          const comp=((jvScores[i]||0)+(isScores[i]||0)+(vtScores[i]||0))/3;
          const worst=Math.max(jvScores[i]||0,isScores[i]||0,vtScores[i]||0);
          return `<tr><td style="font-weight:500">${s}</td><td>${(jvScores[i]||0).toFixed(2)} ${riskBadge(riskLabel(jvScores[i]||0))}</td><td>${(vtScores[i]||0).toFixed(2)} ${riskBadge(riskLabel(vtScores[i]||0))}</td><td>${(isScores[i]||0).toFixed(2)} ${riskBadge(riskLabel(isScores[i]||0))}</td><td style="font-weight:500">${comp.toFixed(2)}</td><td>${riskBadge(riskLabel(worst))}</td></tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
  setTimeout(()=>{
    makeChart('cmp_grouped',{type:'bar',data:{labels:selectedStates,datasets:[{label:'Juvenile Recidivism',data:jvScores,backgroundColor:'#1565C0',borderRadius:2},{label:'Victim Vulnerability',data:vtScores,backgroundColor:'#E53935',borderRadius:2},{label:'Institutional Stress',data:isScores,backgroundColor:'#6D4C41',borderRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11}}}},scales:{y:{min:0,max:1.1}}}});
    makeChart('cmp_radar',{type:'radar',data:{labels:['Juvenile\nRecidivism','Victim\nVulnerability','Institutional\nStress'],datasets:selectedStates.map((s,i)=>{const cols=['#1565C0','#E53935','#388E3C','#F9A825','#8E24AA','#00838F'];return{label:s,data:[jvScores[i]||0,vtScores[i]||0,isScores[i]||0],borderColor:cols[i],backgroundColor:cols[i].replace(')',',0.1)').replace('rgb','rgba'),borderWidth:2,pointRadius:3}})},options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:1,ticks:{stepSize:.25}}},plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:6}}}}});
    const composite=selectedStates.map((_,i)=>((jvScores[i]||0)+(isScores[i]||0)+(vtScores[i]||0))/3);
    const sorted=[...selectedStates.map((s,i)=>({s,v:composite[i]}))].sort((a,b)=>b.v-a.v);
    makeChart('cmp_composite',{type:'bar',data:{labels:sorted.map(x=>x.s),datasets:[{label:'Composite Risk',data:sorted.map(x=>x.v),backgroundColor:sorted.map(x=>riskColor(x.v)),borderRadius:3}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{min:0,max:1.1}}}});
  },100);
}

function updateCharts(){
  // filters applied — re-render current page
  const active=document.querySelector('.nav-item.active');
  if(active)active.click();
}

function exportCSV(){
  const rows=[['State','Juvenile Score','Victim Score','Institutional Score']];
  STATE_DATA.juvenile.forEach(s=>{
    const v=STATE_DATA.victim.find(x=>x.state===s.state);
    const is=STATE_DATA.institutional.find(x=>x.state===s.state);
    rows.push([s.state,s.score.toFixed(3),(v?v.score:0).toFixed(3),(is?is.score:0).toFixed(3)]);
  });
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='india_crime_risk_data.csv';a.click();
}

window.addEventListener('load', () => {
  console.log('📍 Page loaded, initializing dashboard...');
  initializeDashboard().catch(err => {
    console.error('Failed to initialize dashboard:', err);
    // Fallback: render with static data
    renderOverview();
  });
});

// Fallback if window.load doesn't fire quickly
setTimeout(() => {
  if (!CHART_DATA_INITIALIZED && window.STATE_DATA) {
    console.log('⚠️  Timeout: initializing with fallback static data');
    renderOverview();
  }
}, 3000);
</script>
